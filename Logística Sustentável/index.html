<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Logística Verde</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; width: 95%; max-width: 550px; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-top: 10px solid #27ae60; }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .question { font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; color: #2c3e50; min-height: 60px; }
        .options { display: grid; gap: 10px; }
        .btn-opt { padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .btn-opt:hover { border-color: #27ae60; background: #f1fcf4; }
        #feedback { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .correct { background: #d4edda; color: #155724; }
        .wrong { background: #f8d7da; color: #721c24; }
        #next-btn { display: none; width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 8px; background: #2c3e50; color: white; cursor: pointer; font-size: 1rem; }
        .progress { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <h2 style="margin:0; color:#27ae60;">🚛 Missão Sustentável</h2>
        <p style="margin:5px 0; color:#666;">Curso: Auxiliar de Logística</p>
    </div>

    <div id="start-screen" style="text-align:center;">
        <p>Bem-vindo, Jovem Aprendiz! Teste seus conhecimentos sobre Logística e Meio Ambiente.</p>
        <button class="btn-opt" style="width:100%; text-align:center; background:#27ae60; color:white;" onclick="startGame()">INICIAR DESAFIO</button>
    </div>

    <div id="quiz-screen" style="display:none;">
        <div class="progress" id="progress-text">Pergunta 1 de 10</div>
        <div class="question" id="question-text"></div>
        <div class="options" id="options-container"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">PRÓXIMA PERGUNTA ➡️</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "Como são chamadas as empresas que buscam a sustentabilidade apenas para atender requisitos regulatórios?", o: ["Ecologicamente Proativas", "Consumo Tradicional", "Ecologicamente Reativas"], a: 2, f: "Isso! Elas reagem apenas à lei." },
        { q: "Qual a principal causa da poluição do ar no transporte logístico?", o: ["Descarte de pneus", "Fumaça dos escapamentos", "Ruído dos motores"], a: 1, f: "Correto! A fumaça dos veículos é a grande vilã." },
        { q: "Empresas 'Ecologicamente Proativas' buscam a sustentabilidade por meio de:", o: ["Crenças do consumidor", "Exigência do governo apenas", "Sistema de livre mercado"], a: 2, f: "Exato! Faz parte da estratégia competitiva delas." },
        { q: "Na zona rural, como a água é contaminada de acordo com o texto?", o: ["Por pesticidas e produtos químicos", "Pela sombra das árvores", "Por fumaça de cidades"], a: 0, f: "Isso! O escoamento químico é o culpado." },
        { q: "Óleo de motor e fluidos descartados incorretamente poluem:", o: ["Apenas o ar", "Apenas as estradas", "Solo e água"], a: 2, f: "Correto! Eles infiltram no solo e atingem rios." },
        { q: "O objetivo do Consumo Sustentável é:", o: ["Parar totalmente de comprar", "Atender necessidades sem comprometer o futuro", "Aumentar o preço dos produtos"], a: 1, f: "Perfeito! Equilíbrio geracional." },
        { q: "No Ciclo de Vida do Produto, o que ocorre após a Logística e Distribuição?", o: ["Extração de recursos", "Uso e Descarte", "Criação da embalagem"], a: 1, f: "Certinho! É a ponta final do ciclo." },
        { q: "Uma ação de reeducação para reduzir a poluição do ar é:", o: ["Lavar o carro todo dia", "Manutenção periódica do veículo", "Usar pneus carecas"], a: 1, f: "Exato! Motor regulado polui menos." },
        { q: "Qual destes é um risco logístico citado que afeta o fluxo da organização?", o: ["Clima frio", "Roubo de mercadorias", "Falta de café"], a: 1, f: "Infelizmente, o roubo de carga é um risco real." },
        { q: "Lâmpadas e pilhas devem ser descartadas via:", o: ["Lixo comum", "Logística Reversa", "Não precisam ser descartadas"], a: 1, f: "Muito bem! Precisam de tratamento especial." }
    ];

    let current = 0;
    let score = 0;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = quizData[current];
        document.getElementById('progress-text').innerText = `Pergunta ${current + 1} de ${quizData.length}`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';

        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-opt';
            btn.innerText = opt;
            btn.onclick = () => check(i);
            container.appendChild(btn);
        });
    }

    function check(i) {
        const q = quizData[current];
        const fb = document.getElementById('feedback');
        fb.style.display = 'block';
        const btns = document.querySelectorAll('.btn-opt');
        btns.forEach(b => b.disabled = true);

        if(i === q.a) {
            fb.className = 'correct';
            fb.innerText = "✅ " + q.f;
            score++;
        } else {
            fb.className = 'wrong';
            fb.innerText = "❌ O texto aponta outra resposta. Lembre-se das regras ambientais!";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        current++;
        if(current < quizData.length) { showQuestion(); } 
        else { finish(); }
    }

    function finish() {
        const container = document.getElementById('game-container');
        container.innerHTML = `<div style="text-align:center;"><h2>Missão Concluída!</h2><p style="font-size:2rem;">⭐ ${score}/10</p><p>${score >= 7 ? "Excelente! Você está pronto para o mercado!" : "Bom esforço! Que tal revisar o material?"}</p><button class="btn-opt" style="width:100%; text-align:center; background:#2c3e50; color:white;" onclick="location.reload()">RECOMEÇAR</button></div>`;
    }
</script>

</body>
</html>
