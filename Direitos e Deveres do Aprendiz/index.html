<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLT Master: O Desafio do Aprendiz</title>
    <!-- Tailwind CSS para design ágil -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-green: #2ecc71;
            --neon-blue: #3498db;
            --dark-bg: #0f172a;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        .title-font { font-family: 'Orbitron', sans-serif; }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .option-btn:hover {
            transform: translateX(10px);
            background: rgba(52, 152, 219, 0.2);
            border-color: var(--neon-blue);
        }

        .correct-anim {
            background: rgba(46, 204, 113, 0.3) !important;
            border-color: var(--neon-green) !important;
            animation: pulse-green 0.5s infinite alternate;
        }

        .wrong-anim {
            background: rgba(231, 76, 60, 0.3) !important;
            border-color: #e74c3c !important;
            animation: shake 0.4s;
        }

        @keyframes pulse-green {
            from { box-shadow: 0 0 5px var(--neon-green); }
            to { box-shadow: 0 0 20px var(--neon-green); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .progress-bar {
            transition: width 0.5s ease-in-out;
        }

        /* Scanline effect para look gamer */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div id="game-container" class="w-full max-w-3xl z-10">
        
        <!-- Tela Inicial -->
        <div id="start-screen" class="glass p-8 rounded-2xl text-center">
            <h1 class="title-font text-4xl md:text-6xl mb-4 text-blue-400 font-bold uppercase tracking-tighter">CLT MASTER</h1>
            <p class="text-xl mb-8 text-slate-300">O Guia Supremo de Direitos e Deveres do Aprendiz</p>
            <div class="flex flex-col items-center gap-4">
                <button onclick="startGame()" class="title-font bg-blue-600 hover:bg-blue-500 text-white px-12 py-4 rounded-full text-2xl shadow-lg shadow-blue-900/50 transition-all active:scale-95">
                    INICIAR MISSÃO
                </button>
                <p class="text-sm text-slate-500 italic">20 Questões • 100% Baseado na CLT/CIEE</p>
            </div>
        </div>

        <!-- Quiz Ativo -->
        <div id="quiz-screen" class="hidden glass p-6 md:p-8 rounded-2xl relative overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col">
                    <span class="text-blue-400 text-xs uppercase tracking-widest font-bold">Progresso da Carreira</span>
                    <div class="w-48 md:w-64 h-3 bg-slate-800 rounded-full mt-1 overflow-hidden border border-slate-700">
                        <div id="progress-fill" class="progress-bar h-full bg-blue-500" style="width: 0%"></div>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-xs text-slate-400 uppercase">Pontuação</span>
                    <div id="score" class="text-2xl title-font text-yellow-400">000</div>
                </div>
            </div>

            <div id="question-box" class="mb-8">
                <h2 id="question-text" class="text-xl md:text-2xl font-bold mb-6 leading-tight">Carregando pergunta...</h2>
                <div id="options-container" class="grid grid-cols-1 gap-3">
                    <!-- Botões injetados via JS -->
                </div>
            </div>

            <div id="feedback-area" class="h-12 flex items-center justify-center">
                <p id="feedback-text" class="text-lg font-bold opacity-0 transition-opacity"></p>
            </div>
        </div>

        <!-- Tela Final -->
        <div id="result-screen" class="hidden glass p-8 rounded-2xl text-center">
            <h2 class="title-font text-4xl mb-4 text-yellow-400">MISSÃO CONCLUÍDA!</h2>
            <div class="text-6xl mb-4">🏆</div>
            <p id="final-stats" class="text-2xl mb-8">Você acertou 0 de 20 questões.</p>
            <div id="rank-badge" class="inline-block px-6 py-2 rounded-lg bg-blue-900/50 border border-blue-400 text-blue-200 title-font mb-8 uppercase tracking-widest">
                Classificação: Estagiário
            </div>
            <button onclick="location.reload()" class="block w-full bg-slate-700 hover:bg-slate-600 p-4 rounded-xl title-font transition-all">
                TENTAR NOVAMENTE
            </button>
        </div>

    </div>

    <script>
        const questions = [
            { q: "O que é a CLT e qual seu principal objetivo?", options: ["Guia de etiqueta profissional.", "Conjunto de leis que regulamenta as relações de trabalho.", "Manual para demitir funcionários.", "Documento apenas sobre o salário mínimo."], correct: 1 },
            { q: "Qual o período máximo de um contrato de aprendizagem?", options: ["Até 1 ano.", "Até 2 anos.", "Até 5 anos.", "Tempo indeterminado."], correct: 1 },
            { q: "Limite de horas diárias para aprendiz com fundamental completo?", options: ["4 horas.", "6 horas.", "8 horas.", "10 horas."], correct: 1 },
            { q: "O Jovem Aprendiz pode realizar horas extras?", options: ["Sim, com adicional de 50%.", "Não, é proibido por lei.", "Sim, com autorização do gestor.", "Apenas em datas festivas."], correct: 1 },
            { q: "Valor da alíquota do FGTS para o Aprendiz?", options: ["2%.", "8%.", "11%.", "0% (Isento)."], correct: 0 },
            { q: "Qual regra de férias é obrigatória para o aprendiz?", options: ["Pagar em dobro sempre.", "Coincidir com férias escolares.", "O aprendiz não tem direito a férias.", "Dividir em 4 períodos."], correct: 1 },
            { q: "Documento obrigatório para anotações profissionais?", options: ["CPF.", "CTPS (Carteira de Trabalho).", "Título de Eleitor.", "Certidão de Nascimento."], correct: 1 },
            { q: "O que caracteriza o DSR (Descanso Semanal)?", options: ["12 horas consecutivas.", "24 horas consecutivas.", "48 horas seguidas.", "Apenas feriados."], correct: 1 },
            { q: "Rescisão antecipada por baixo desempenho dá direito a aviso prévio?", options: ["Sim, obrigatoriamente.", "Não há previsão legal para isso.", "Apenas se tiver mais de 1 ano.", "É opcional para a empresa."], correct: 1 },
            { q: "Qual a idade permitida para ingressar como Jovem Aprendiz?", options: ["12 a 18 anos.", "14 a 24 anos incompletos.", "16 a 21 anos.", "Após os 18 anos."], correct: 1 },
            { q: "Punição para falta injustificada nas aulas teóricas?", options: ["Desconto no salário e possível rescisão.", "Nenhuma, aulas não são trabalho.", "Apenas perda do certificado.", "Multa para a empresa."], correct: 0 },
            { q: "Natureza do contrato de aprendizagem?", options: ["Prestação de serviço autônomo.", "Trabalho especial por escrito e prazo determinado.", "Acordo verbal de cooperação.", "Estágio sem vínculo."], correct: 1 },
            { q: "O aprendiz tem direito ao Vale-Transporte para quais trajetos?", options: ["Apenas casa-empresa.", "Casa-empresa e Casa-curso.", "Apenas se morar longe (+10km).", "Não tem direito ao benefício."], correct: 1 },
            { q: "O que acontece ao atingir 24 anos durante o contrato?", options: ["Renovação automática.", "Extinção automática do contrato.", "O salário dobra.", "Efetivação obrigatória."], correct: 1 },
            { q: "Quem ministra a formação teórica?", options: ["O gestor da empresa.", "Entidades qualificadoras (CIEE/Senai/etc).", "Qualquer escola estadual.", "Ministério da Economia online."], correct: 1 },
            { q: "Como é calculado o salário do aprendiz?", options: ["Livre decisão da empresa.", "Proporcional ao salário mínimo hora.", "Sempre igual aos funcionários antigos.", "Metade do valor do estagiário."], correct: 1 },
            { q: "Qual situação abona falta sem desconto?", options: ["Aniversário.", "Exame Vestibular.", "Viagem de lazer.", "Ida ao banco."], correct: 1 },
            { q: "Percentual máximo de desconto do Vale-Transporte?", options: ["2%.", "6% do salário-base.", "10% do total.", "O valor integral das passagens."], correct: 1 },
            { q: "O contrato pode ser prorrogado após 2 anos?", options: ["Sim, por mais 2 anos.", "Não (salvo exceção PcD).", "Apenas se estiver na faculdade.", "Sim, pagando taxa extra."], correct: 1 },
            { q: "Validade jurídica da Carteira de Trabalho Digital?", options: ["Apenas rascunho.", "Mesmo valor que a física.", "Só vale com firma reconhecida.", "Vale apenas para consulta."], correct: 1 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let canAnswer = true;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            canAnswer = true;
            const q = questions[currentQuestion];
            const qText = document.getElementById('question-text');
            const optionsContainer = document.getElementById('options-container');
            const feedback = document.getElementById('feedback-text');
            
            feedback.style.opacity = '0';
            qText.innerText = `${currentQuestion + 1}. ${q.q}`;
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn glass p-4 rounded-xl text-left flex items-center gap-4';
                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-600 text-sm font-bold">${String.fromCharCode(65 + index)}</span>
                    <span>${opt}</span>
                `;
                btn.onclick = () => selectOption(index, btn);
                optionsContainer.appendChild(btn);
            });

            // Update Progress
            const percent = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${percent}%`;
        }

        function selectOption(index, element) {
            if (!canAnswer) return;
            canAnswer = false;

            const q = questions[currentQuestion];
            const feedback = document.getElementById('feedback-text');

            if (index === q.correct) {
                score += 100;
                element.classList.add('correct-anim');
                feedback.innerText = "SISTEMA: ACESSO PERMITIDO! ✅";
                feedback.className = "text-green-400 text-lg font-bold transition-opacity opacity-100";
                updateScore();
            } else {
                element.classList.add('wrong-anim');
                feedback.innerText = "SISTEMA: ERRO DE PROTOCOLO! ❌";
                feedback.className = "text-red-500 text-lg font-bold transition-opacity opacity-100";
                
                // Mostrar a correta
                const btns = document.querySelectorAll('.option-btn');
                btns[q.correct].classList.add('correct-anim');
            }

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    showQuestion();
                } else {
                    showResults();
                }
            }, 1800);
        }

        function updateScore() {
            const scoreEl = document.getElementById('score');
            let currentDisplay = parseInt(scoreEl.innerText);
            const target = score;
            const interval = setInterval(() => {
                if (currentDisplay < target) {
                    currentDisplay += 5;
                    scoreEl.innerText = currentDisplay.toString().padStart(3, '0');
                } else {
                    clearInterval(interval);
                }
            }, 20);
        }

        function showResults() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const stats = document.getElementById('final-stats');
            const badge = document.getElementById('rank-badge');
            
            const hits = score / 100;
            stats.innerText = `Você acertou ${hits} de ${questions.length} missões.`;

            if (hits === 20) {
                badge.innerText = "Classificação: CEO da CLT";
                badge.className = "inline-block px-6 py-2 rounded-lg bg-green-900/50 border border-green-400 text-green-200 title-font mb-8 uppercase tracking-widest";
            } else if (hits >= 15) {
                badge.innerText = "Classificação: Gestor Master";
                badge.className = "inline-block px-6 py-2 rounded-lg bg-blue-900/50 border border-blue-400 text-blue-200 title-font mb-8 uppercase tracking-widest";
            } else if (hits >= 10) {
                badge.innerText = "Classificação: Aprendiz Conectado";
                badge.className = "inline-block px-6 py-2 rounded-lg bg-yellow-900/50 border border-yellow-400 text-yellow-200 title-font mb-8 uppercase tracking-widest";
            } else {
                badge.innerText = "Classificação: Iniciante (Precisa revisar)";
                badge.className = "inline-block px-6 py-2 rounded-lg bg-red-900/50 border border-red-400 text-red-200 title-font mb-8 uppercase tracking-widest";
            }
        }
    </script>
</body>
</html>
